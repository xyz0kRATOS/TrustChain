specVersion: 1.0.0
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: CampaignFactory
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: CampaignFactory
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Milestone
        - FundraiserProfile
      abis:
        - name: CampaignFactory
          file: CampaignFactory\CampaignFactory.json
      eventHandlers:
        - event: CampaignCreated(indexed address,indexed address,indexed
            uint256,uint256,uint256,bytes32)
          handler: handleCampaignCreated
      file: CampaignFactory\CampaignFactory.wasm
  - kind: ethereum/contract
    name: DonationNFT
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: DonationNFT
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Donation
      abis:
        - name: DonationNFT
          file: DonationNFT\DonationNFT.json
      eventHandlers:
        - event: DonationNFTMinted(indexed uint256,indexed address,indexed address,uint256,string)
          handler: handleDonationNFTMinted
      file: CampaignFactory\CampaignFactory.wasm
  - kind: ethereum/contract
    name: ReputationRegistry
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: ReputationRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - FundraiserProfile
      abis:
        - name: ReputationRegistry
          file: ReputationRegistry\ReputationRegistry.json
      eventHandlers:
        - event: ReputationUpdated(indexed address,int256,string)
          handler: handleReputationUpdated
      file: CampaignFactory\CampaignFactory.wasm
  - kind: ethereum/contract
    name: Campaign
    network: base-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: Campaign
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Milestone
        - Donation
        - FundRelease
        - DonorRefund
      abis:
        - name: Campaign
          file: Campaign\Campaign.json
      eventHandlers:
        - event: DonationReceived(indexed address,uint256,indexed uint256,uint256)
          handler: handleDonationReceived
        - event: MilestoneApproved(indexed uint256,indexed address,uint256)
          handler: handleMilestoneApproved
        - event: FundsReleased(indexed uint256,uint256,indexed address)
          handler: handleFundsReleased
        - event: CampaignFrozen(indexed address,uint256)
          handler: handleCampaignFrozen
        - event: DonorRefunded(indexed address,uint256)
          handler: handleDonorRefunded
        - event: CampaignCompleted(uint256)
          handler: handleCampaignCompleted
        - event: CampaignUpdated(indexed uint256,bytes32,string,uint256)
          handler: handleCampaignUpdated
        - event: MilestoneAmended(indexed uint256,bytes32,uint256)
          handler: handleMilestoneAmended
      file: CampaignFactory\CampaignFactory.wasm
templates:
  - kind: ethereum/contract
    name: CampaignTemplate
    network: base-sepolia
    source:
      abi: Campaign
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Campaign
        - Milestone
        - Donation
        - FundRelease
        - DonorRefund
      abis:
        - name: Campaign
          file: CampaignTemplate\Campaign.json
      eventHandlers:
        - event: DonationReceived(indexed address,uint256,indexed uint256,uint256)
          handler: handleDonationReceived
        - event: MilestoneApproved(indexed uint256,indexed address,uint256)
          handler: handleMilestoneApproved
        - event: FundsReleased(indexed uint256,uint256,indexed address)
          handler: handleFundsReleased
        - event: CampaignFrozen(indexed address,uint256)
          handler: handleCampaignFrozen
        - event: DonorRefunded(indexed address,uint256)
          handler: handleDonorRefunded
        - event: CampaignCompleted(uint256)
          handler: handleCampaignCompleted
        - event: CampaignUpdated(indexed uint256,bytes32,string,uint256)
          handler: handleCampaignUpdated
        - event: MilestoneAmended(indexed uint256,bytes32,uint256)
          handler: handleMilestoneAmended
      file: CampaignFactory\CampaignFactory.wasm
